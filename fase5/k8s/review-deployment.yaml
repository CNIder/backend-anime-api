apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
  namespace: artur-matos
  labels:
    app: review-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: review-service
  template:
    metadata:
      labels:
        app: review-service
    spec:
      containers:
      - name: review-service
        image: europe-west4-docker.pkg.dev/lucky-starlight-492017-k8/anime-repo/review-service:latest
        ports:
        - containerPort: 5001
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: FLASK_ENV
          value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: review-service
  namespace: artur-matos
spec:
  selector:
    app: review-service
  ports:
  - port: 80
    targetPort: 5001
    protocol: TCP
  type: ClusterIP