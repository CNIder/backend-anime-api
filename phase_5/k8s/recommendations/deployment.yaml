apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendations
  namespace: anime-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: recommendations
  template:
    metadata:
      labels:
        app: recommendations
    spec:
      serviceAccountName: anime-api-sa
      containers:
        - name: recommendations
          image: europe-west1-docker.pkg.dev/temp-488519/anime-repo/recommendations-bq:phase5-v3
          ports:
            - containerPort: 8080
          env:
            - name: GCP_PROJECT_ID
              value: "temp-488519"
            - name: BQ_DATASET
              value: "anime_intel_dataset"
            - name: BQ_TABLE
              value: "anime_intel"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
